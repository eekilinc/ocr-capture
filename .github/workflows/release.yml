name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. main'e push'ta tauri.conf.json'dan versiyon oku, tag yoksa oluştur
  # ─────────────────────────────────────────────────────────────────────────────
  create-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_created: ${{ steps.push_tag.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Versiyonu tauri.conf.json'dan oku
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versiyon: $VERSION"

      - name: Tag zaten var mı kontrol et ve oluştur
        id: push_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG zaten mevcut, atlanıyor."
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG oluşturuldu ve push edildi."
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Tag push'ta (v*) platformlara göre derleme ve release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
            rust-targets: 'x86_64-pc-windows-msvc'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      # ── LINUX ────────────────────────────────────────────────────────────────
      - name: Linux sistem bağımlılıklarını kur
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            tesseract-ocr \
            tesseract-ocr-tur \
            tesseract-ocr-eng \
            pkg-config \
            libclang-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev

      # ── MACOS ────────────────────────────────────────────────────────────────
      - name: macOS Tesseract kur
        if: matrix.platform == 'macos-latest'
        run: brew install tesseract tesseract-lang

      # ── WINDOWS ──────────────────────────────────────────────────────────────
      - name: Windows Tesseract kur (Chocolatey)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          choco install tesseract --yes
          $tessPath = "C:\Program Files\Tesseract-OCR"
          echo "$tessPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "TESSERACT_PATH=$tessPath\tesseract.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Windows Türkçe dil paketini kur
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $tessdata = "C:\Program Files\Tesseract-OCR\tessdata"
          Invoke-WebRequest `
            -Uri "https://github.com/tesseract-ocr/tessdata/raw/main/tur.traineddata" `
            -OutFile "$tessdata\tur.traineddata"
          Invoke-WebRequest `
            -Uri "https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata" `
            -OutFile "$tessdata\eng.traineddata"

      # ── NODE & RUST ──────────────────────────────────────────────────────────
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Rust araç zincirini kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust önbelleği
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── BUILD ────────────────────────────────────────────────────────────────
      - name: Frontend bağımlılıklarını yükle
        run: npm install

      - name: Versiyonu oku
        id: get_version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Uygulamayı derle ve Release oluştur
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: '1'
        with:
          tagName: v${{ steps.get_version.outputs.version }}
          releaseName: 'Metin Yakalayıcı v${{ steps.get_version.outputs.version }}'
          releaseBody: |
            ## Metin Yakalayıcı v${{ steps.get_version.outputs.version }}

            ### Kurulum

            | Platform | Dosya | Açıklama |
            |---|---|---|
            | Windows | `*_x64-setup.exe` | NSIS Kurulum Sihirbazı (Önerilen) |
            | macOS (Apple Silicon) | `*_aarch64.dmg` | macOS Apple Silicon |
            | macOS (Intel) | `*_x64.dmg` | macOS Intel |
            | Linux | `*.deb` | Debian/Ubuntu Paketi |
            | Linux | `*.AppImage` | Taşınabilir Linux Uygulaması |

            > **Not:** Windows'ta OCR özelliğini kullanabilmek için [Tesseract-OCR](https://github.com/UB-Mannheim/tesseract/wiki) kurulu olması gerekmektedir.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
